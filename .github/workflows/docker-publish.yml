name: Publish FL Node to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - "fl_nodes/**"
      - "Dockerfile.node"
  workflow_dispatch:

env:
  IMAGE: undosatech/fl-node

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # cosign keyless signing via GitHub OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.node
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Supply chain: signature + SBOM ─────────────────────────────────────
      # Institutions verify with:
      #   cosign verify undosatech/fl-node:latest \
      #     --certificate-identity-regexp "^https://github.com/Johnuzo89/undosatech" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: fl-node-sbom.cdx.json
          upload-artifact: true
          artifact-name: fl-node-sbom

      - name: Attach SBOM as signed attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type cyclonedx --predicate fl-node-sbom.cdx.json "${IMAGE}@${DIGEST}"
