name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only torch first (smaller, cached)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify FastAPI app boots
        run: python -c "from orchestrator.api import app; print(f'{len(app.routes)} routes OK')"

  portal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install, lint, test, build
        working-directory: portal
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: portal-dist
          path: portal/dist
          retention-days: 7

  deploy-railway:
    # Backend → Railway. Needs RAILWAY_TOKEN repo secret
    # (Railway → Account Settings → Tokens; scope it to the project).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret not set — skipping Railway deploy"
            exit 0
          fi
          npx -y @railway/cli up --detach --service "${{ vars.RAILWAY_SERVICE || 'undosatech' }}"

  deploy-vercel:
    # Portal → Vercel. Needs VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
    # repo secrets (from `vercel link` → .vercel/project.json).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: portal-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: portal
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret not set — skipping Vercel deploy"
            exit 0
          fi
          npx -y vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx -y vercel build --prod --token="$VERCEL_TOKEN"
          npx -y vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
