# docker-compose.node.yml
# ─────────────────────────────────────────────────────────────────────────────
# UndosaTech FL Node — institutions run this on their own infrastructure.
#
# SETUP (institution IT team):
#   1. Copy this file and create a .env.node file (see bottom of this file)
#   2. docker compose -f docker-compose.node.yml up -d
#   3. Check logs: docker compose -f docker-compose.node.yml logs -f
#   4. The node appears in app.undosatech.com → Nodes tab within 30 seconds.
#
# SUPPORT: contact the UndosaTech team for NODE_REGISTRATION_SECRET.
# ─────────────────────────────────────────────────────────────────────────────

services:
  fl-node:
    image: undosatech/fl-node:latest
    # Or build locally from source:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.node

    container_name: undosatech-fl-node
    restart: unless-stopped

    env_file:
      - .env.node   # ← create this file (see template at bottom)

    environment:
      ORCHESTRATOR_URL: "https://undosatech-production.up.railway.app"

    ports:
      - "${NODE_PORT:-8080}:8080"   # Flower gRPC — must be reachable from internet

    volumes:
      - node_credentials:/app      # persists api_key across container restarts
      # Optional: mount your local data directory (never leaves this machine)
      # - /path/to/local/patient/data:/data:ro

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

volumes:
  node_credentials:

# ─────────────────────────────────────────────────────────────────────────────
# Create .env.node alongside this file (never commit to version control):
#
#   NODE_ID=nhs-kings-001
#   INSTITUTION_NAME=King's College Hospital NHS Foundation Trust
#   INSTITUTION_DOMAIN=kch.nhs.uk
#   CONTACT_EMAIL=research-it@kch.nhs.uk
#   NODE_HOST=203.0.113.10
#   NODE_PORT=8080
#   NODE_REGISTRATION_SECRET=<ask UndosaTech team for this>
#   GPU_AVAILABLE=false
#   MAX_SAMPLES=10000
#   SUPPORTED_MODELS=ResNet-18,ResNet-50,EfficientNet-B0
#   TAGS=ophthalmology,retinal
# ─────────────────────────────────────────────────────────────────────────────
